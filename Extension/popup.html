<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetSave</title>
  <style>
    body {
      margin: 0;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #fff;
    }
    .container { padding: 16px; }
    h1 { margin: 0 0 4px; font-size: 1.1rem; }
    p { margin: 0 0 12px; color: #4b5563; font-size: 0.9rem; }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .primary { background: #24292f; color: #fff; }
    .secondary { background: #f3f4f6; color: #111827; margin-top: 8px; }
    .danger { background: #fee2e2; color: #991b1b; margin-top: 8px; }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #f9fafb;
      font-size: 0.85rem;
    }
    .user { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .user img { width: 28px; height: 28px; border-radius: 50%; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LeetSave</h1>
    <p>Sync accepted LeetCode solutions to GitHub.</p>

    <div id="logged-out">
      <button id="login-btn" class="primary">Continue with GitHub</button>
      <button id="logout-stale-btn" class="danger hidden">Logout</button>
    </div>

    <div id="logged-in" class="hidden">
      <div class="user">
        <img id="avatar" alt="" />
        <div>
          <div id="username"></div>
          <div id="repo" style="font-size: 0.8rem; color: #6b7280;"></div>
        </div>
      </div>
      <button id="login-again-btn" class="secondary">Reconnect GitHub</button>
      <button id="logout-btn" class="danger">Logout</button>
    </div>

    <div id="status" class="status hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
