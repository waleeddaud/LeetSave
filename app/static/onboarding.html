<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetSave</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
      width: min(420px, 90vw);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 1.75rem; }
    p { margin: 0 0 24px; color: #4b5563; line-height: 1.5; }
    .note { font-size: 0.85rem; color: #6b7280; margin-top: 16px; }
    a.button {
      display: inline-block;
      background: #24292f;
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
    }
    a.button:hover { background: #1b1f23; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LeetSave</h1>
    <p>Sync your accepted LeetCode solutions to a single GitHub repository with AI explanations.</p>
    <a class="button" href="/api/v1/auth/github/login">Continue with GitHub</a>
    <p class="note">GitHub access is used only to create or update your LeetCode solutions repository.</p>
  </div>
</body>
</html>
