<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetSave Connected</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0fdf4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      background: #fff;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      padding: 32px;
      width: min(460px, 90vw);
      text-align: center;
    }
    h1 { color: #166534; margin-top: 0; }
    p { color: #374151; line-height: 1.5; }
    .countdown { font-weight: 600; color: #166534; }
  </style>
</head>
<body>
  <div class="card">
    <h1>GitHub Connected</h1>
    <p>LeetSave saved your session successfully.</p>
    <p>Open the <strong>LeetSave extension popup</strong> to confirm your GitHub username is shown.</p>
    <p class="countdown">This tab will close in <span id="seconds">4</span> seconds.</p>
  </div>
  <script>
    let remaining = 4;
    const el = document.getElementById("seconds");
    setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) return;
      el.textContent = String(remaining);
    }, 1000);
  </script>
</body>
</html>
