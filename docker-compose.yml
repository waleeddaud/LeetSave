services:
  db:
    image: postgres:16
    container_name: leetsave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leetsave
      POSTGRES_PASSWORD: leetsave
      POSTGRES_DB: leetcode_github_sync
    ports:
      - "5432:5432"
    volumes:
      - leetsave_pg_data:/var/lib/postgresql/data

volumes:
  leetsave_pg_data:
